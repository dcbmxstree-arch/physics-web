<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton-Raphson Master | PHYSICS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --accent: #F59E0B; --danger: #EF4444; --success: #10B981; --bg: #F8FAFC; --border: #E2E8F0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1E293B; margin: 0; line-height: 1.5; }
        
        /* Barra de Navegación y Botón Retorno */
        .nav-bar { background: white; border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; sticky: top; z-index: 100; }
        .btn-back { display: flex; align-items: center; gap: 8px; color: var(--secondary); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.2s; padding: 8px 12px; border-radius: 6px; }
        .btn-back:hover { background: #F1F5F9; color: var(--primary); }
        .btn-back svg { width: 18px; height: 18px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; margin-bottom: 30px; }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-weight: 800; margin: 0; font-size: 1.8rem; color: #0F172A; }
        h3 { margin-top: 0; color: #0F172A; font-weight: 800; }

        /* Inputs y Tabla */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #64748B; }
        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-family: 'Fira Code', monospace; }
        
        canvas { display: block; background: white; width: 100%; height: 450px; border-radius: 8px; }
        .table-wrapper { overflow-x: auto; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #F1F5F9; position: sticky; top: 0; padding: 12px; border-bottom: 2px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-family: 'Fira Code', monospace; text-align: center; }
        
        .theory-box { font-size: 0.9rem; border-left: 4px solid var(--primary); padding: 15px; background: #F1F5F9; border-radius: 0 8px 8px 0; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="btn-back">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Volver a PHYSICS
    </a>
</nav>

<div class="container">
    <div class="header">
        <h1>Método de Newton-Raphson</h1>
        <p>Análisis Numérico de Raíces • Herramientas de Ingeniería</p>
    </div>

    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <h3>Parámetros</h3>
                <div class="input-group">
                    <label>Función f(x)</label>
                    <input type="text" id="input-fx" value="x^3 - 2*x - 5">
                </div>
                <div class="input-group">
                    <label>Derivada f'(x)</label>
                    <div id="output-dfx" style="padding: 10px; background: #F8FAFC; border-radius: 8px; font-family: 'Fira Code'; color: var(--primary); font-size: 0.9rem;"></div>
                </div>
                <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>x₀</label><input type="number" id="input-x0" value="1.0" step="0.1"></div>
                    <div><label>Tolerancia</label><input type="text" id="input-tol" value="1e-6"></div>
                </div>
                <div id="status-msg" style="font-size: 0.85rem; font-weight: 700; margin-top: 10px;"></div>
            </div>

            <div class="card">
                <h3>Teoría</h3>
                <div class="theory-box">
                    Interpretación geométrica: la tangente en el punto actual corta al eje X para dar la siguiente aproximación.
                    <p style="text-align:center; font-weight:bold; color:var(--primary); margin: 10px 0;">x<sub>n+1</sub> = x<sub>n</sub> - f(x<sub>n</sub>)/f'(x<sub>n</sub>)</p>
                </div>
                
            </div>
        </div>

        <div class="content">
            <div class="card" style="padding:0; overflow:hidden;">
                <canvas id="canvas"></canvas>
            </div>
            
            <div class="card">
                <h3>Iteraciones</h3>
                <div class="table-wrapper">
                    <table id="iter-table">
                        <thead>
                            <tr><th>k</th><th>xₖ</th><th>f(xₖ)</th><th>f'(xₖ)</th><th>Error</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Lógica de cálculo y graficación (Newton-Raphson)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const inputs = ['input-fx', 'input-x0', 'input-tol'];

    function init() {
        canvas.width = canvas.offsetWidth;
        canvas.height = 450;
        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        calculate();
    }

    function calculate() {
        const fxStr = document.getElementById('input-fx').value;
        const x0 = parseFloat(document.getElementById('input-x0').value);
        const tol = parseFloat(document.getElementById('input-tol').value);
        const tableBody = document.querySelector('#iter-table tbody');
        
        tableBody.innerHTML = '';
        try {
            const node = math.parse(fxStr);
            const derivNode = math.derivative(fxStr, 'x');
            const f = node.compile();
            const df = derivNode.compile();
            document.getElementById('output-dfx').innerText = `f'(x) = ${derivNode.toString()}`;

            let x = x0, iterations = [], converged = false;
            for (let k = 0; k <= 25; k++) {
                const fk = f.evaluate({x});
                const dfk = df.evaluate({x});
                const error = k === 0 ? '-' : Math.abs(x - iterations[k-1].x);
                iterations.push({ k, x, fk, dfk, error });
                if (k > 0 && error < tol) { converged = true; break; }
                x = x - (fk / dfk);
            }

            iterations.forEach(it => {
                const row = tableBody.insertRow();
                row.innerHTML = `<td>${it.k}</td><td>${it.x.toFixed(6)}</td><td>${it.fk.toExponential(2)}</td><td>${it.dfk.toFixed(4)}</td><td>${typeof it.error === 'number' ? it.error.toExponential(2) : '-'}</td>`;
            });

            draw(f, iterations);
        } catch (e) { console.error(e); }
    }

    function draw(f, iters) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const root = iters[iters.length-1].x;
        const minX = root - 4, maxX = root + 4;
        const mapX = (x) => 50 + (x - minX) * (canvas.width - 100) / (maxX - minX);
        const mapY = (y) => 225 - y * 20;

        // Ejes
        ctx.strokeStyle = '#CBD5E1'; ctx.beginPath(); ctx.moveTo(0, 225); ctx.lineTo(canvas.width, 225); ctx.stroke();
        
        // Curva
        ctx.strokeStyle = '#2563EB'; ctx.lineWidth = 2; ctx.beginPath();
        for(let x = minX; x <= maxX; x += 0.1) {
            ctx.lineTo(mapX(x), mapY(f.evaluate({x})));
        }
        ctx.stroke();

        // Raíz
        ctx.fillStyle = '#EF4444'; ctx.beginPath(); ctx.arc(mapX(root), 225, 6, 0, 7); ctx.fill();
    }

    window.onload = init;
</script>
</body>
</html>
