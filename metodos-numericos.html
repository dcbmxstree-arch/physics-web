<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton-Raphson Master | PHYSICS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --accent: #F59E0B; --danger: #EF4444; --success: #10B981; --bg: #F8FAFC; --border: #E2E8F0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1E293B; margin: 0; }
        
        /* Navegación Centrada */
        .nav-bar { background: white; border-bottom: 1px solid var(--border); padding: 15px; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
        .btn-back { display: flex; align-items: center; gap: 10px; color: #64748B; text-decoration: none; font-weight: 700; padding: 10px 20px; border: 2px solid var(--border); border-radius: 30px; transition: 0.3s; }
        .btn-back:hover { border-color: var(--primary); color: var(--primary); background: #EFF6FF; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; margin-top: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #0F172A; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }

        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-family: 'Fira Code', monospace; margin-bottom: 10px; }
        label { font-size: 0.8rem; font-weight: 600; color: #64748B; display: block; margin-bottom: 4px; }

        /* Gráfico */
        #canvas-container { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        canvas { display: block; width: 100%; height: 500px; }

        .table-wrapper { overflow-x: auto; max-height: 300px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: center; }
        th { background: #F8FAFC; font-weight: 700; }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="btn-back">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Volver al Panel Principal
    </a>
</nav>

<div class="container">
    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <h3>Parámetros de Entrada</h3>
                <label>Función f(x)</label>
                <input type="text" id="input-fx" value="x^3 - 2*x - 5">
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>x₀ (Inicial)</label>
                        <input type="number" id="input-x0" value="1.0" step="0.1">
                    </div>
                    <div style="flex: 1;">
                        <label>Tolerancia</label>
                        <input type="text" id="input-tol" value="1e-6">
                    </div>
                </div>
                
                <div id="status-box" style="margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;"></div>
            </div>

            <div class="card">
                <h3>Teoría Rápida</h3>
                <p style="font-size: 0.85rem; color: #475569;">
                    El método usa la tangente para hallar la raíz:
                    <strong style="display: block; text-align: center; color: var(--primary); margin: 10px 0;">x<sub>n+1</sub> = x<sub>n</sub> - f(x<sub>n</sub>)/f'(x<sub>n</sub>)</strong>
                </p>
                
            </div>
        </div>

        <div class="content">
            <div id="canvas-container" class="card" style="padding: 0;">
                <canvas id="newtonCanvas"></canvas>
            </div>
            
            <div class="card">
                <h3>Tabla de Iteraciones</h3>
                <div class="table-wrapper">
                    <table id="iter-table">
                        <thead>
                            <tr><th>k</th><th>xₖ</th><th>f(xₖ)</th><th>Error</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('newtonCanvas');
    const ctx = canvas.getContext('2d');
    const inputs = ['input-fx', 'input-x0', 'input-tol'];

    function init() {
        resize();
        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        window.addEventListener('resize', resize);
        calculate();
    }

    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = 500;
        calculate();
    }

    function calculate() {
        const fxStr = document.getElementById('input-fx').value;
        const x0 = parseFloat(document.getElementById('input-x0').value);
        const tol = parseFloat(document.getElementById('input-tol').value);
        const statusBox = document.getElementById('status-box');
        const tableBody = document.querySelector('#iter-table tbody');
        
        tableBody.innerHTML = '';
        
        try {
            const node = math.parse(fxStr);
            const f = node.compile();
            const df = math.derivative(fxStr, 'x').compile();

            let x = x0, iterations = [], converged = false;
            for (let k = 0; k < 20; k++) {
                const y = f.evaluate({x});
                const dy = df.evaluate({x});
                const error = k === 0 ? '-' : Math.abs(x - iterations[k-1].x);
                
                iterations.push({ k, x, y, dy, error });
                if (k > 0 && error < tol) { converged = true; break; }
                if (Math.abs(dy) < 1e-10) break;
                x = x - (y / dy);
            }

            // Actualizar Tabla
            iterations.forEach(it => {
                const row = tableBody.insertRow();
                row.innerHTML = `<td>${it.k}</td><td>${it.x.toFixed(6)}</td><td>${it.y.toExponential(2)}</td><td>${typeof it.error === 'number' ? it.error.toExponential(2) : '-'}</td>`;
            });

            statusBox.style.background = converged ? '#ECFDF5' : '#FFF7ED';
            statusBox.style.color = converged ? '#065F46' : '#9A3412';
            statusBox.innerText = converged ? `✓ Convergió en x ≈ ${x.toFixed(5)}` : "Calculando...";

            drawGraph(f, iterations);
        } catch (e) {
            statusBox.innerText = "Error en la función";
            statusBox.style.background = "#FEF2F2";
        }
    }

    function drawGraph(f, iters) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const root = iters[iters.length-1].x;
        const xStart = iters[0].x;
        
        // Definir límites dinámicos
        let minX = Math.min(xStart, root) - 1.5;
        let maxX = Math.max(xStart, root) + 1.5;
        let minY = -5, maxY = 5;

        // Probar valores de y para ajustar escala vertical
        for(let xi = minX; xi <= maxX; xi += (maxX-minX)/20) {
            try {
                let yi = f.evaluate({x: xi});
                if(yi < minY) minY = yi - 1;
                if(yi > maxY) maxY = yi + 1;
            } catch(e) {}
        }

        const mapX = (x) => (x - minX) * canvas.width / (maxX - minX);
        const mapY = (y) => canvas.height - (y - minY) * canvas.height / (maxY - minY);

        // 1. Dibujar Malla (Grid)
        ctx.strokeStyle = '#F1F5F9';
        ctx.lineWidth = 1;
        for(let i = Math.floor(minX); i <= maxX; i++) {
            ctx.beginPath(); ctx.moveTo(mapX(i), 0); ctx.lineTo(mapX(i), canvas.height); ctx.stroke();
        }

        // 2. Ejes
        ctx.strokeStyle = '#94A3B8';
        ctx.lineWidth = 2;
        ctx.beginPath(); // Eje X
        ctx.moveTo(0, mapY(0)); ctx.lineTo(canvas.width, mapY(0)); ctx.stroke();
        ctx.beginPath(); // Eje Y
        ctx.moveTo(mapX(0), 0); ctx.lineTo(mapX(0), canvas.height); ctx.stroke();

        // 3. Función
        ctx.strokeStyle = '#2563EB';
        ctx.lineWidth = 3;
        ctx.beginPath();
        for(let x = minX; x <= maxX; x += (maxX-minX)/200) {
            let y = f.evaluate({x});
            ctx.lineTo(mapX(x), mapY(y));
        }
        ctx.stroke();

        // 4. Aproximaciones y Tangentes
        iters.forEach((it, i) => {
            // Punto en la curva
            ctx.fillStyle = i === 0 ? '#10B981' : '#F59E0B';
            ctx.beginPath();
            ctx.arc(mapX(it.x), mapY(it.y), 5, 0, 7);
            ctx.fill();

            // Dibujar Tangente punteada hacia el eje X
            if(i < iters.length - 1) {
                const nextX = iters[i+1].x;
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#94A3B8';
                ctx.beginPath();
                ctx.moveTo(mapX(it.x), mapY(it.y));
                ctx.lineTo(mapX(nextX), mapY(0));
                ctx.stroke();
                ctx.setLineDash([]);
            }
        });

        // 5. Raíz Final
        const finalX = iters[iters.length-1].x;
        ctx.fillStyle = '#EF4444';
        ctx.beginPath();
        ctx.arc(mapX(finalX), mapY(0), 7, 0, 7);
        ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.font = "bold 14px Inter";
        ctx.fillStyle = "#1E293B";
        ctx.fillText(`Raíz: ${finalX.toFixed(5)}`, mapX(finalX) + 10, mapY(0) - 15);
    }

    window.onload = init;
</script>

</body>
</html>
