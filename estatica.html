<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámica: Plano Inclinado | PHYSICS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f59e0b; --bg: #f8fafc; --dark: #0f172a; --border: #e2e8f0; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #1e293b; overflow-x: hidden; }
        
        .navbar { background: white; padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .btn-back { text-decoration: none; color: #64748b; font-weight: 700; border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; transition: 0.3s; }
        .btn-back:hover { border-color: var(--primary); color: var(--primary); }

        .main-layout { display: grid; grid-template-columns: 350px 1fr 300px; gap: 20px; padding: 20px; height: calc(100vh - 80px); box-sizing: border-box; }
        @media (max-width: 1200px) { .main-layout { grid-template-columns: 1fr; height: auto; } }

        .card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .simulator-box { background: #cbd5e1; border-radius: 12px; position: relative; min-height: 450px; flex-grow: 1; }
        
        .controls label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-top: 15px; text-transform: uppercase; }
        .controls input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }
        
        canvas { width: 100%; height: 100%; border-radius: 12px; }

        .vector-display { font-family: 'Fira Code', monospace; background: var(--dark); color: #fbbf24; padding: 15px; border-radius: 8px; font-size: 0.85rem; line-height: 1.5; }
        .btn-run { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-run:hover { background: #d97706; transform: translateY(-2px); }
        
        .theory-badge { background: #fffbeb; border-left: 4px solid var(--primary); padding: 10px; font-size: 0.8rem; margin-top: 15px; }
    </style>
</head>
<body>

<nav class="navbar">
    <h2 style="margin:0; font-weight: 900; color: var(--dark);">PHYSICS <span style="color:var(--primary)">DYNAMICS</span></h2>
    <a href="index.html" class="btn-back">← SALIR</a>
</nav>

<div class="main-layout">
    <div class="card controls">
        <h3 style="margin-top:0">Configuración</h3>
        
        <label>Ángulo de Inclinación (θ): <b id="val_angle">30</b>°</label>
        <input type="range" id="angle" min="0" max="75" value="30" oninput="resetSim()">

        <label>Masa del Bloque (m): <b id="val_mass">5</b> kg</label>
        <input type="range" id="mass" min="1" max="50" value="5" oninput="resetSim()">

        <label>Coef. Fricción Estática (μs): <b id="val_us">0.5</b></label>
        <input type="range" id="us" min="0" max="1" step="0.05" value="0.5" oninput="resetSim()">

        <label>Coef. Fricción Cinética (μk): <b id="val_uk">0.3</b></label>
        <input type="range" id="uk" min="0" max="1" step="0.05" value="0.3" oninput="resetSim()">

        <button class="btn-run" onclick="startSim()">EJECUTAR SIMULACIÓN</button>
        
        <div class="theory-badge">
            <strong>Condición de Movimiento:</strong><br>
            Se mueve si: \( mg \sin\theta > \mu_s N \)
        </div>
    </div>

    <div class="card simulator-box">
        <canvas id="simCanvas"></canvas>
    </div>

    <div class="card">
        <h3 style="margin-top:0">Resultados (DCL)</h3>
        <div class="vector-display" id="results">
            -- Ajuste los parámetros --
        </div>
        
        <div style="margin-top:20px; flex-grow:1">
            <label>Distribución de Energía (J)</label>
            <canvas id="energyChart"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    let animationId;
    let pos = 0;
    let vel = 0;
    let energyChart;

    function resetSim() {
        cancelAnimationFrame(animationId);
        pos = 0;
        vel = 0;
        update();
    }

    function update() {
        const thetaDeg = parseFloat(document.getElementById('angle').value);
        const m = parseFloat(document.getElementById('mass').value);
        const us = parseFloat(document.getElementById('us').value);
        const uk = parseFloat(document.getElementById('uk').value);
        const g = 9.81;

        document.getElementById('val_angle').innerText = thetaDeg;
        document.getElementById('val_mass').innerText = m;
        document.getElementById('val_us').innerText = us;
        document.getElementById('val_uk').innerText = uk;

        const rad = thetaDeg * (Math.PI / 180);
        const Wx = m * g * Math.sin(rad);
        const Wy = m * g * Math.cos(rad);
        const N = Wy;
        const fs_max = us * N;
        
        let status = "";
        let accel = 0;
        let fr_val = 0;

        if (Wx > fs_max) {
            fr_val = uk * N;
            accel = (Wx - fr_val) / m;
            status = "MOVIMIENTO ACELERADO";
        } else {
            fr_val = Wx;
            status = "EQUILIBRIO ESTÁTICO";
            accel = 0;
        }

        document.getElementById('results').innerHTML = `
            <b>ESTADO:</b> <span style="color:white">${status}</span><br>
            --------------------------<br>
            Componente Wx: ${Wx.toFixed(2)} N<br>
            Componente Wy: ${Wy.toFixed(2)} N<br>
            Fuerza Normal: ${N.toFixed(2)} N<br>
            Fricción (fr): ${fr_val.toFixed(2)} N<br>
            Aceleración: ${accel.toFixed(2)} m/s²
        `;

        drawScene(rad, pos, Wx, Wy, N, fr_val);
        updateEnergyChart(m, vel, pos, rad);
    }

    function drawVector(x, y, dx, dy, color, label) {
        if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + dx, y + dy);
        ctx.stroke();
        const angle = Math.atan2(dy, dx);
        ctx.beginPath();
        ctx.moveTo(x + dx, y + dy);
        ctx.lineTo(x + dx - 10 * Math.cos(angle - Math.PI/6), y + dy - 10 * Math.sin(angle - Math.PI/6));
        ctx.lineTo(x + dx - 10 * Math.cos(angle + Math.PI/6), y + dy - 10 * Math.sin(angle + Math.PI/6));
        ctx.closePath();
        ctx.fill();
        ctx.font = "bold 12px Inter";
        ctx.fillText(label, x + dx + 5, y + dy + 5);
    }

    function drawScene(rad, offset, Wx, Wy, N, fr) {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);
        
        // Base del suelo
        ctx.fillStyle = "#94a3b8";
        ctx.fillRect(0, h-40, w, 40);

        // Plano Inclinado
        ctx.save();
        ctx.translate(100, h-40);
        ctx.rotate(-rad);
        
        ctx.fillStyle = "#f1f5f9";
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(w, 0);
        ctx.lineTo(0, w * Math.tan(rad));
        ctx.fill();

        ctx.strokeStyle = var(--dark);
        ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(w,0); ctx.stroke();

        // Bloque
        const bw = 80, bh = 40;
        const bx = offset, by = -bh;
        ctx.fillStyle = var(--primary);
        ctx.fillRect(bx, by, bw, bh);
        ctx.strokeStyle = "#b45309";
        ctx.lineWidth = 2;
        ctx.strokeRect(bx, by, bw, bh);

        // Vectores Dinámicos
        const cx = bx + bw/2, cy = by + bh/2;
        const s = 1.5; // Escala de fuerza
        drawVector(cx, cy, 0, -N*s, "#10b981", "N");      // Normal
        drawVector(cx, cy, 0, Wy*s, "#64748b", "mg cosθ"); // Peso Y
        drawVector(cx, cy, Wx*s, 0, "#ef4444", "mg sinθ"); // Peso X
        drawVector(cx, cy, -fr*s, 0, "#3b82f6", "fr");    // Fricción

        ctx.restore();
    }

    function startSim() {
        resetSim();
        const m = parseFloat(document.getElementById('mass').value);
        const theta = parseFloat(document.getElementById('angle').value) * (Math.PI / 180);
        const uk = parseFloat(document.getElementById('uk').value);
        const us = parseFloat(document.getElementById('us').value);
        const g = 9.81;
        
        const Wx = m * g * Math.sin(theta);
        const N = m * g * Math.cos(theta);
        const accel = Wx > (us * N) ? (Wx - uk * N) / m : 0;

        function animate() {
            if (pos < canvas.width - 250 && accel > 0) {
                vel += accel * 0.016;
                pos += vel * 0.5; // Ajuste visual de velocidad
                update();
                animationId = requestAnimationFrame(animate);
            }
        }
        if(accel > 0) animate();
    }

    function updateEnergyChart(m, v, p, rad) {
        const ctxE = document.getElementById('energyChart').getContext('2d');
        const h0 = 100; // altura relativa
        const Ec = 0.5 * m * v * v;
        const Ep = m * 9.81 * Math.max(0, (h0 - p * Math.sin(rad)));

        if(energyChart) energyChart.destroy();
        energyChart = new Chart(ctxE, {
            type: 'doughnut',
            data: {
                labels: ['E. Potencial', 'E. Cinética'],
                datasets: [{
                    data: [Ep.toFixed(2), Ec.toFixed(2)],
                    backgroundColor: ['#3b82f6', '#f59e0b'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    window.onload = update;
</script>
</body>
</html>
