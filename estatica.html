<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Caída Libre | PHYSICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --secondary: #dc2626; --bg: #f8fafc; --dark: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { max-width: 800px; text-align: center; margin-bottom: 20px; }
        .header h1 { font-weight: 900; margin: 0; }
        .header p { color: #64748b; font-size: 0.9rem; }

        .canvas-container { background: white; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 10px; }
        canvas { display: block; border-radius: 8px; }

        .controls-card {
            background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;
            width: 100%; max-width: 800px; margin-top: 20px;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input[type="range"] { accent-color: var(--primary); }
        input[type="number"] { padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Fira Code', monospace; }
        
        .btn-reset { background: var(--dark); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-reset:hover { background: #1e293b; }
        
        .value-tag { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHYSICS <span style="color: var(--primary);">FALL LAB</span></h1>
        <p>Compara la caída ideal frente a la caída con arrastre lineal. Ajusta la altura de lanzamiento y observa cómo la fricción afecta la velocidad de impacto y los rebotes.</p>
    </div>

    <div class="canvas-container">
        <canvas id="simCanvas" width="800" height="400"></canvas>
    </div>

    <div class="controls-card">
        <div class="control-group">
            <label>Altura Inicial (px):</label>
            <input type="number" id="hInput" value="50" min="20" max="300" onchange="resetSim()">
        </div>
        <div class="control-group">
            <label>Restitución (e): <span id="eVal" class="value-tag">0.80</span></label>
            <input type="range" id="eSlider" min="0" max="1" step="0.01" value="0.8">
        </div>
        <div class="control-group">
            <label>Arrastre (k): <span id="kVal" class="value-tag">0.05</span></label>
            <input type="range" id="kSlider" min="0" max="0.2" step="0.001" value="0.05">
        </div>
        <div class="control-group" style="justify-content: center; flex-direction: row; align-items: center; gap: 10px;">
            <input type="checkbox" id="pauseCheck"> <label style="margin:0">PAUSAR</label>
        </div>
        <button class="btn-reset" onclick="resetSim()">REINICIAR</button>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    // Parámetros Físicos Fijos
    const g = 0.5;
    const floorY = 380;
    const radius = 15;

    // Pelotas
    let ballIdeal = { y: 50, vy: 0, color: '#2563eb', label: 'IDEAL' };
    let ballDrag = { y: 50, vy: 0, color: '#dc2626', label: 'ARRASTRE' };

    function resetSim() {
        const startY = parseInt(document.getElementById('hInput').value);
        ballIdeal.y = ballDrag.y = startY;
        ballIdeal.vy = ballDrag.vy = 0;
    }

    function update() {
        if (document.getElementById('pauseCheck').checked) return;

        const e = parseFloat(document.getElementById('eSlider').value);
        const k = parseFloat(document.getElementById('kSlider').value);
        
        document.getElementById('eVal').innerText = e.toFixed(2);
        document.getElementById('kVal').innerText = k.toFixed(3);

        // Física Ideal
        ballIdeal.vy += g;
        ballIdeal.y += ballIdeal.vy;
        if (ballIdeal.y + radius >= floorY) {
            ballIdeal.vy = -ballIdeal.vy * e;
            ballIdeal.y = floorY - radius;
        }

        // Física con Arrastre (F = mg - kv)
        let accelDrag = g - (k * ballDrag.vy);
        ballDrag.vy += accelDrag;
        ballDrag.y += ballDrag.vy;
        if (ballDrag.y + radius >= floorY) {
            ballDrag.vy = -ballDrag.vy * e;
            ballDrag.y = floorY - radius;
        }
    }

    function draw() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Suelo
        ctx.fillStyle = "#78350f";
        ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);

        // Dibujar elementos
        [[ballIdeal, 250], [ballDrag, 550]].forEach(([ball, x]) => {
            // Sombra proyectada
            const shadowSize = Math.max(5, 15 - (floorY - ball.y)/20);
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            ctx.beginPath();
            ctx.ellipse(x, floorY, shadowSize, 5, 0, 0, Math.PI*2);
            ctx.fill();

            // Pelota
            ctx.beginPath();
            ctx.arc(x, ball.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.2)";
            ctx.stroke();

            // Datos
            ctx.fillStyle = "#1e293b";
            ctx.font = "bold 13px Inter";
            ctx.textAlign = "center";
            ctx.fillText(ball.label, x, ball.y - 25);
            ctx.fillStyle = "#64748b";
            ctx.font = "11px 'Fira Code'";
            ctx.fillText(`v: ${Math.abs(ball.vy).toFixed(2)} px/f`, x, ball.y + 35);
        });
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    resetSim();
    loop();
</script>
</body>
</html>
