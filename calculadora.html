<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Áreas | PHYSICS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563EB;
            --dark: #0A1F44;
            --light: #F3F4F6;
            --accent: #d1dbff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            margin: 0;
            color: var(--dark);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--light);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 { font-weight: 800; font-size: 1.6rem; margin: 0; }
        
        .back-link { text-decoration: none; color: var(--primary); font-weight: 600; }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        
        label { font-weight: 600; font-size: 0.85rem; }

        input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        input:focus { outline: none; border-color: var(--primary); }

        /* Guía de Sintaxis */
        .syntax-guide {
            grid-column: 1 / -1;
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .syntax-list {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 0;
            list-style: none;
            margin-top: 8px;
        }

        .syntax-list code { background: #fff; padding: 2px 4px; border-radius: 3px; border: 1px solid #ccd; }

        .btn-calc {
            grid-column: 1 / -1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-calc:hover { background: #1d4ed8; transform: translateY(-1px); }

        #plot { width: 100%; height: 450px; margin-top: 25px; border-radius: 8px; border: 1px solid #eee; }

        .results {
            margin-top: 20px;
            padding: 20px;
            background: var(--light);
            border-radius: 8px;
            display: none;
        }

        .res-val { font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <h1>Calculadora de Áreas</h1>
        <a href="index.html" class="back-link">← Volver a PHYSICS</a>
    </div>

    <div class="input-grid">
        <div class="form-group">
            <label>Función f(x)</label>
            <input type="text" id="f-func" value="x^2" placeholder="Ej: x^2">
        </div>
        <div class="form-group">
            <label>Función g(x)</label>
            <input type="text" id="g-func" value="x" placeholder="Ej: x">
        </div>
        
        <div class="syntax-guide">
            <strong>💡 Guía de ingreso de funciones:</strong>
            <ul class="syntax-list">
                <li>Seno: <code>sin(x)</code></li>
                <li>Coseno: <code>cos(x)</code></li>
                <li>Potencia: <code>x^2</code></li>
                <li>Raíz: <code>sqrt(x)</code></li>
                <li>Log: <code>ln(x)</code></li>
                <li>Exp: <code>e^x</code></li>
            </ul>
        </div>

        <div class="form-group">
            <label>Límite inferior (a)</label>
            <input type="number" id="lim-a" step="any" placeholder="Auto">
        </div>
        <div class="form-group">
            <label>Límite superior (b)</label>
            <input type="number" id="lim-b" step="any" placeholder="Auto">
        </div>

        <button class="btn-calc" onclick="calcularArea()">Calcular Área Sombreada</button>
    </div>

    <div id="res-panel" class="results">
        <div>Intersecciones: <span id="inter-val" class="res-val"></span></div>
        <div style="font-size: 1.3rem; margin-top: 10px;">Área Total: <span id="area-val" class="res-val"></span> u²</div>
    </div>

    <div id="plot"></div>
</div>

<script>
    /**
     * Motor de Cálculo de PHYSICS
     */
    function calcularArea() {
        let f_str = document.getElementById('f-func').value;
        let g_str = document.getElementById('g-func').value;
        let a = parseFloat(document.getElementById('lim-a').value);
        let b = parseFloat(document.getElementById('lim-b').value);

        // Traducción automática de 'sen' a 'sin' para estudiantes hispanos
        f_str = f_str.toLowerCase().replace(/sen/g, 'sin');
        g_str = g_str.toLowerCase().replace(/sen/g, 'sin');

        try {
            const f = math.compile(f_str);
            const g = math.compile(g_str);
            const h_func = (x) => f.evaluate({x}) - g.evaluate({x});

            // Buscar intersecciones en [-10, 10] si no hay límites
            let inters = [];
            const pasos = 1000;
            for (let i = -100; i <= 100; i++) {
                let x1 = i / 10;
                let x2 = (i + 1) / 10;
                if (h_func(x1) * h_func(x2) < 0) {
                    inters.push(math.bisect(h_func, x1, x2));
                }
            }

            if (isNaN(a) || isNaN(b)) {
                if (inters.length < 2) {
                    alert("Ingresa límites manualmente o usa funciones que se corten.");
                    return;
                }
                a = inters[0];
                b = inters[inters.length - 1];
            }

            // Integración Numérica (Simpson 1/3)
            let area = 0;
            const n = 1000;
            const dx = (b - a) / n;
            for (let i = 0; i <= n; i++) {
                let x = a + i * dx;
                let val = Math.abs(f.evaluate({x}) - g.evaluate({x}));
                let peso = (i === 0 || i === n) ? 1 : (i % 2 === 0 ? 2 : 4);
                area += (dx / 3) * val * peso;
            }

            // UI y Gráfico
            document.getElementById('res-panel').style.display = 'block';
            document.getElementById('area-val').innerText = area.toFixed(4);
            document.getElementById('inter-val').innerText = inters.length > 0 ? inters.map(i => i.toFixed(2)).join(', ') : "Ninguna";

            graficar(f_str, g_str, a, b, inters);

        } catch (e) {
            alert("Error matemático: Revisa la sintaxis.");
        }
    }

    function graficar(f_str, g_str, a, b, inters) {
        const xArr = [], yF = [], yG = [], xArea = [], yF_Area = [], yG_Area = [];
        const padding = Math.abs(b - a) * 0.5 || 2;
        
        for (let x = a - padding; x <= b + padding; x += 0.05) {
            xArr.push(x);
            let vf = math.evaluate(f_str, {x});
            let vg = math.evaluate(g_str, {x});
            yF.push(vf); yG.push(vg);
            if (x >= a && x <= b) {
                xArea.push(x); yF_Area.push(vf); yG_Area.push(vg);
            }
        }

        const data = [
            {
                x: [...xArea, ...xArea.reverse()],
                y: [...yF_Area, ...yG_Area.reverse()],
                fill: 'toself',
                fillcolor: 'rgba(37, 99, 235, 0.15)',
                line: {color: 'transparent'},
                name: 'Área'
            },
            { x: xArr, y: yF, name: 'f(x)', line: {color: '#2563EB'} },
            { x: xArr, y: yG, name: 'g(x)', line: {color: '#0A1F44'} },
            { x: inters, y: inters.map(x => math.evaluate(f_str, {x})), mode: 'markers', name: 'Cortes', marker: {color: 'red'} }
        ];

        Plotly.newPlot('plot', data, { margin: {t:30, b:40, l:40, r:20}, hovermode: 'closest' });
    }

    // Calcular por defecto al cargar
    window.onload = calcularArea;
</script>

</body>
</html>
