<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistemas Dinámicos | PHYSICS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --accent: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        .navbar { background: white; padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .solucion-box { 
            background: #0f172a; color: #38bdf8; padding: 20px; border-radius: 8px; 
            font-family: 'Fira Code', monospace; font-size: 1.1rem; text-align: center;
            border-left: 5px solid var(--accent); margin: 15px 0; overflow-x: auto;
        }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Fira Code'; }
        
        .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .badge { background: #f1f5f9; padding: 10px; border-radius: 6px; text-align: center; }
        .badge b { display: block; color: var(--primary); font-size: 1.1rem; }

        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; background: #e2e8f0; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        canvas { width: 100%; height: 400px !important; }
    </style>
</head>
<body>

<nav class="navbar">
    <h2 style="margin:0;">PHYSICS <small style="font-weight:400; font-size:0.9rem;">Simulador de 2do Orden</small></h2>
    <a href="index.html" style="text-decoration:none; color:var(--primary); font-weight:700;">← VOLVER</a>
</nav>

<div class="container">
    <div class="tab-nav">
        <button id="btn-m" class="tab-btn active" onclick="setMode('M')">Mecánico (M-B-K)</button>
        <button id="btn-e" class="tab-btn" onclick="setMode('E')">Eléctrico (R-L-C)</button>
    </div>

    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <h3 id="panel-title">Parámetros</h3>
                <div id="inputs-container"></div>
                
                <label>Excitación</label>
                <select id="input_type" onchange="update()">
                    <option value="0">Respuesta Libre (F=0)</option>
                    <option value="1">Escalón Unitario</option>
                </select>
            </div>

            <div class="card">
                <label>Propiedades del Sistema</label>
                <div class="badge-grid">
                    <div class="badge"><b id="out_wn">0</b><span>ωn (rad/s)</span></div>
                    <div class="badge"><b id="out_z">0</b><span>Zeta (ζ)</span></div>
                </div>
                <div id="out_type" style="margin-top:10px; text-align:center; font-weight:800; padding:10px; border-radius:6px;"></div>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <label>Función de la Solución Analítica:</label>
                <div id="solucion_str" class="solucion-box">Cargando...</div>
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let mode = 'M'; // M: Mecánico, E: Eléctrico
    let chart;

    const configs = {
        M: { title: "Masa-Resorte", p1: "Masa (kg)", p2: "Amort. (b)", p3: "Resorte (k)", v1: 1, v2: 0.5, v3: 10, ic1: "x(0)", ic2: "v(0)", ic1v: 1, ic2v: 0 },
        E: { title: "Circuito RLC", p1: "Resist. (R)", p2: "Induc. (L)", p3: "Capac. (C)", v1: 10, v2: 1, v3: 0.01, ic1: "Vc(0)", ic2: "i(0)", ic1v: 5, ic2v: 0 }
    };

    function setMode(m) {
        mode = m;
        document.getElementById('btn-m').className = m === 'M' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-e').className = m === 'E' ? 'tab-btn active' : 'tab-btn';
        renderInputs();
        update();
    }

    function renderInputs() {
        const c = configs[mode];
        document.getElementById('inputs-container').innerHTML = `
            <div class="input-group"><label>${c.p1}</label><input type="number" id="p1" value="${c.v1}" oninput="update()"></div>
            <div class="input-group"><label>${c.p2}</label><input type="number" id="p2" value="${c.v2}" oninput="update()"></div>
            <div class="input-group"><label>${c.p3}</label><input type="number" id="p3" value="${c.v3}" oninput="update()"></div>
            <div class="badge-grid">
                <div class="input-group"><label>${c.ic1}</label><input type="number" id="ic1" value="${c.ic1v}" oninput="update()"></div>
                <div class="input-group"><label>${c.ic2}</label><input type="number" id="ic2" value="${c.ic2v}" oninput="update()"></div>
            </div>
        `;
    }

    function update() {
        const p1 = parseFloat(document.getElementById('p1').value);
        const p2 = parseFloat(document.getElementById('p2').value);
        const p3 = parseFloat(document.getElementById('p3').value);
        const x0 = parseFloat(document.getElementById('ic1').value);
        const v0_raw = parseFloat(document.getElementById('ic2').value);
        const step = parseFloat(document.getElementById('input_type').value);

        let wn, z, v0;
        if(mode === 'M') {
            wn = Math.sqrt(p3/p1);
            z = p2 / (2 * Math.sqrt(p3 * p1));
            v0 = v0_raw;
        } else {
            wn = 1 / Math.sqrt(p2 * p3);
            z = (p1 / 2) * Math.sqrt(p3 / p2);
            v0 = v0_raw / p3; // i = C * dv/dt
        }

        document.getElementById('out_wn').innerText = wn.toFixed(3);
        document.getElementById('out_z').innerText = z.toFixed(3);
        
        const info = document.getElementById('out_type');
        if(z < 1) { info.innerText = "SUBAMORTIGUADO"; info.style.background = "#dbeafe"; info.style.color = "#1e40af"; }
        else if(z === 1) { info.innerText = "CRÍTICO"; info.style.background = "#dcfce7"; info.style.color = "#166534"; }
        else { info.innerText = "SOBREAMORTIGUADO"; info.style.background = "#ffedd5"; info.style.color = "#9a3412"; }

        solve(wn, z, x0, v0, step);
    }

    function solve(wn, z, x0, v0, A) {
        let solText = "";
        let fn;
        const tMax = mode === 'E' ? 0.5 : 20;

        if (z < 1) { // Subamortiguado
            const wd = wn * Math.sqrt(1 - z*z);
            const C1 = x0 - A;
            const C2 = (v0 + z * wn * C1) / wd;
            solText = `${A.toFixed(1)} + e^{-${(z*wn).toFixed(2)}t} [ ${C1.toFixed(2)} cos(${(wd).toFixed(2)}t) + ${C2.toFixed(2)} sin(${(wd).toFixed(2)}t) ]`;
            fn = (t) => A + Math.exp(-z * wn * t) * (C1 * Math.cos(wd * t) + C2 * Math.sin(wd * t));
        } else if (z === 1) { // Crítico
            const C1 = x0 - A;
            const C2 = v0 + wn * C1;
            solText = `${A.toFixed(1)} + (${C1.toFixed(2)} + ${C2.toFixed(2)}t) e^{-${wn.toFixed(2)}t}`;
            fn = (t) => A + (C1 + C2 * t) * Math.exp(-wn * t);
        } else { // Sobreamortiguado
            const s1 = -wn * (z - Math.sqrt(z*z - 1));
            const s2 = -wn * (z + Math.sqrt(z*z - 1));
            const C2 = (v0 - s1*(x0-A)) / (s2 - s1);
            const C1 = (x0 - A) - C2;
            solText = `${A.toFixed(1)} + ${C1.toFixed(2)} e^{${s1.toFixed(2)}t} + ${C2.toFixed(2)} e^{${s2.toFixed(2)}t}`;
            fn = (t) => A + C1 * Math.exp(s1 * t) + C2 * Math.exp(s2 * t);
        }

        document.getElementById('solucion_str').innerText = mode === 'M' ? `x(t) = ${solText}` : `Vc(t) = ${solText}`;
        draw(fn, tMax, A);
    }

    function draw(fn, tMax, A) {
        const labels = [], data = [], stepData = [];
        for(let t=0; t<=tMax; t += tMax/200) {
            labels.push(t.toFixed(2));
            data.push(fn(t));
            stepData.push(A);
        }

        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'Respuesta Temporal', data: data, borderColor: '#2563eb', borderWidth: 3, pointRadius: 0, tension: 0.3 },
                           { label: 'Entrada Escalón', data: stepData, borderColor: '#ef4444', borderDash: [5,5], pointRadius: 0 }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: true, title: { display: true, text: 'Tiempo (s)' } } } }
        });
    }

    window.onload = () => setMode('M');
</script>
</body>
</html>
